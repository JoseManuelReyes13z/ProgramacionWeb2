<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de usuarios desde JSON</title>
</head>
<body>
    <h2>Gestor de usuarios desde JSON</h2>

    <!-- Formulario para agregar un nuevo usuario -->
    <form id="formulario">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>
        <br>

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" required>
        <br>

        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" required>
        <br>

        <button type="submit">Agregar Usuario</button>
    </form>

    <br>

    <!-- Importar usuarios desde JSON -->
    <input type="file" id="importarJSON" accept=".json">
    <button id="descargarJSON" type="button">Descargar JSON</button>

    <br><br>

    <!-- Tabla para mostrar los usuarios -->
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Correo electrónico</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaUsuarios">
            <!-- Aquí se agregarán los usuarios registrados -->
        </tbody>
    </table>

    <script src="app2.js"></script>
</body>
</html>
